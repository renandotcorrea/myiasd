<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="">
<meta name="author" content="Renan de Andrade Correa">
<title>Escala da Semana · IASD Central de Centro Novo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<meta name="theme-color" content="#712cf9">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
.item {
  margin-left: 0.5rem;
  margin-bottom: 0.375rem;
  font-size: 0.95rem;
}
</style>
</head>

<body class="d-flex flex-column min-vh-100">
<main>
  <div class="container text-center">
    <div class="row text-start">
      <div class="col-2 d-flex align-items-center justify-content-center">
        <a href="../index.html" class="text-decoration-none p-2 fs-6 text-black d-flex">
          <i class="bi bi-arrow-left fs-5"></i>
        </a>
      </div>
      <div class="col-8 text-center d-flex justify-content-center align-items-center">
        <h2 class="fs-5 mb-0">Escala da Semana</h2>
      </div>
      <div class="col-2 d-flex justify-content-end align-items-center">
        <img src="../assets/logo-colorido.jpeg" class="rounded-circle align-center" alt="Logo IASD"
             style="width: 30px; height: 30px;">
      </div>
    </div>

    <div class="row align-items-center mt-2">
      <div class="col d-grid gap-3 col-lg-5 mx-auto">
        <div id="escala" class="card shadow-sm border-0 text-start">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <div class="fs-5 fw-bold">ESCALA DA SEMANA</div>
              <p class="mt-2 fs-6">Confira os participantes desta semana</p>
              <div id="periodo" class="text-body-secondary mt-1"></div>
            </div>

            <div id="dom" class="mb-4">
              <h3 id="dom-title" class="fs-6 fw-bold mb-2">DOM</h3>
            </div>

            <div id="qua" class="mb-4">
              <h3 id="qua-title" class="fs-6 fw-bold mb-2">QUA</h3>
            </div>

            <div id="sab" class="mb-1">
              <h3 id="sab-title" class="fs-6 fw-bold mb-2">SÁB</h3>
            </div>
          </div>
        </div>

        <button onclick="baixarImagem()" class="btn btn-outline-dark btn-lg fs-6">
          <i class="bi bi-download"></i> Baixar como imagem
        </button>
      </div>
    </div>
  </div>
</main>

<footer class="mt-auto">
  <div class="container text-center">
    <div class="row align-items-center">
      <div class="col d-flex justify-content-center mb-3 text-body-secondary">
        <p style="font-size: 0.8rem;">Made with <i class="bi bi-heart-fill text-danger"></i> by <a href="https://linktr.ee/renandotcorrea" class="text-decoration-none">Renan de Andrade</a></p>
      </div>
    </div>
  </div>
</footer>

<script>

let dados = null;

async function carregarJSON() {
  const response = await fetch("../assets/escalas.json");
  dados = await response.json();
  gerarEscala();
}

function formatarDataBR(data) {
  return data.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}

function obterSemanaAtual() {
  const hoje = new Date();
  const diaSemana = hoje.getDay();

  const domingo = new Date(hoje);
  domingo.setDate(hoje.getDate() - diaSemana);

  const sabado = new Date(domingo);
  sabado.setDate(domingo.getDate() + 6);

  return { domingo, sabado };
}

function buscarEventoPorData(dataAlvo, categoria) {
  if (!dados[categoria]) return null;

  const iso = dataAlvo.toISOString().split("T")[0];

  return dados[categoria].data.find(item =>
    item.date.startsWith(iso)
  );
}

function gerarEscala() {

  const { domingo, sabado } = obterSemanaAtual();

  document.getElementById("periodo").innerText =
    `${formatarDataBR(domingo)} – ${formatarDataBR(sabado)}`;

  const quarta = new Date(domingo);
  quarta.setDate(domingo.getDate() + 3);

  atualizarDia("dom", domingo, "Dom");
  atualizarDia("qua", quarta, "Qua");
  atualizarDia("sab", sabado, "Sáb");
}

function atualizarDia(id, data, weekday) {

  const container = document.getElementById(id);
  const titulo = document.getElementById(id + "-title");

  titulo.innerText = `${weekday.toUpperCase()} ${formatarDataBR(data)}`;

  const louvor = buscarEventoPorData(data, "louvor-congregacional");
  const especial = buscarEventoPorData(data, "louvor-especial");
  const escola = buscarEventoPorData(data, "escola-sabatina");
  const adoracao_infantil = buscarEventoPorData(data, "adoracao-infantil");

  if (louvor) adicionarItem(container, "<strong>Louvor congregacional:</strong> " + louvor.person);
  if (especial) adicionarItem(container, "<strong>Música especial:</strong> " + especial.person);

  if (weekday === "Sáb") {
    if (escola) adicionarItem(container, "<strong>Escola Sabatina:</strong> " + escola.person);
    if (adoracao_infantil) adicionarItem(container, "<strong>Adoração Infantil:</strong> " + adoracao_infantil.person);
  }
}

function adicionarItem(container, texto) {
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = texto;
  container.appendChild(div);
}

function baixarImagem() {
  html2canvas(document.getElementById("escala"), { scale: 2 })
  .then(canvas => {
    const link = document.createElement("a");
    link.download = "escala-da-semana.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

carregarJSON();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
  crossorigin="anonymous"></script>

</body>
</html>
